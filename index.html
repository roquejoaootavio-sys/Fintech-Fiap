<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fintech - Movimentações</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body class="bg-slate-100">

<!-- MENU MOBILE -->
<header class="md:hidden bg-[#0B132B] text-white p-4 shadow-lg">
    <div class="flex justify-between items-center">
        <h1 class="font-bold text-xl">Fintech+</h1>

        <i class="fa-solid fa-bars text-2xl"></i>
    </div>
</header>

<div class="flex min-h-screen">

    <!-- SIDEBAR DESKTOP -->
    <aside class="hidden md:flex sidebar text-white flex-col p-6">

        <h1 class="text-3xl font-bold mb-10">
            Fintech+
        </h1>

        <nav class="space-y-2">

            <a href="#" class="menu-item">
                <i class="fa-solid fa-chart-line"></i>
                Dashboard
            </a>

            <a href="#" class="menu-item active">
                <i class="fa-solid fa-money-bill-transfer"></i>
                Movimentações
            </a>

            <a href="#" class="menu-item">
                <i class="fa-solid fa-tags"></i>
                Categorias
            </a>

            <a href="#" class="menu-item">
                <i class="fa-solid fa-wallet"></i>
                Carteira
            </a>

            <a href="#" class="menu-item">
                <i class="fa-solid fa-credit-card"></i>
                Cartões
            </a>

            <a href="#" class="menu-item">
                <i class="fa-solid fa-gear"></i>
                Configurações
            </a>

        </nav>

        <div class="mt-auto pt-8">
            <div class="bg-white/10 p-4 rounded-xl">
                <p class="font-semibold">João Silva</p>
                <p class="text-sm opacity-80">
                    joao@email.com
                </p>
            </div>
        </div>

    </aside>

    <!-- CONTEÚDO -->
    <main class="flex-1 p-4 md:p-8">

        <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-4 mb-8">

            <div>
                <h2 class="text-3xl font-bold">
                    Cadastrar Movimentação
                </h2>

                <p class="text-gray-500">
                    Registre entradas e saídas financeiras
                </p>
            </div>

            <button class="btn-primary">
                Salvar Movimentação
            </button>

        </div>

        <!-- CARDS -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-8">

            <div class="card-info">
                <i class="fa-solid fa-arrow-trend-up text-green-500 text-4xl"></i>

                <div>
                    <p>Total Entradas</p>
                    <h3 class="text-green-600 font-bold text-2xl">
                        R$ 5.350,80
                    </h3>
                </div>
            </div>

            <div class="card-info">
                <i class="fa-solid fa-arrow-trend-down text-red-500 text-4xl"></i>

                <div>
                    <p>Total Saídas</p>
                    <h3 class="text-red-600 font-bold text-2xl">
                        R$ 3.500,00
                    </h3>
                </div>
            </div>

            <div class="card-info">
                <i class="fa-solid fa-wallet text-purple-500 text-4xl"></i>

                <div>
                    <p>Saldo Atual</p>
                    <h3 class="text-purple-600 font-bold text-2xl">
                        R$ 1.850,80
                    </h3>
                </div>
            </div>

        </div>

        <!-- FORMULÁRIO -->
        <section class="bg-white rounded-2xl shadow-md p-6">

            <h3 class="text-xl font-semibold mb-6">
                Nova Movimentação
            </h3>

            <form>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">

                    <div>
                        <label class="label">Tipo</label>
                        <select class="input">
                            <option>Entrada</option>
                            <option>Saída</option>
                        </select>
                    </div>

                    <div>
                        <label class="label">Valor</label>
                        <input type="number"
                        class="input"
                        placeholder="R$ 0,00">
                    </div>

                    <div class="md:col-span-2">
                        <label class="label">Descrição</label>
                        <input type="text"
                        class="input"
                        placeholder="Descrição da movimentação">
                    </div>

                    <div>
                        <label class="label">Categoria</label>
                        <select class="input">
                            <option>Alimentação</option>
                            <option>Transporte</option>
                            <option>Lazer</option>
                        </select>
                    </div>

                    <div>
                        <label class="label">Conta</label>
                        <select class="input">
                            <option>Conta Corrente</option>
                            <option>Poupança</option>
                        </select>
                    </div>

                    <div>
                        <label class="label">Data</label>
                        <input type="date" class="input">
                    </div>

                    <div>
                        <label class="label">
                            Forma de Pagamento
                        </label>

                        <select class="input">
                            <option>Pix</option>
                            <option>Cartão</option>
                            <option>Dinheiro</option>
                        </select>
                    </div>

                    <div class="md:col-span-2">
                        <label class="label">
                            Observação
                        </label>

                        <textarea
                        rows="4"
                        class="input"
                        placeholder="Digite uma observação"></textarea>
                    </div>

                </div>

                <div class="flex flex-col md:flex-row justify-end gap-3 mt-6">

                    <button type="button"
                    class="btn-secondary">
                        Cancelar
                    </button>

                    <button type="submit"
                    class="btn-primary">
                        Salvar
                    </button>

                </div>

            </form>

        </section>

    </main>

</div>

</body>
</html>
